<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 451 117" role="img" aria-labelledby="title description">
  <title id="title">Home Assistant CLI type-checking benchmark</title>
  <desc id="description">ty: 1.98 seconds; Pyrefly: 2.56 seconds; Pyright: 23.70 seconds; mypy: 24.34 seconds.</desc>
  <style>
    .benchmarkBar {
      fill: #6340AC;
    }
    .benchmarkLabel {
      fill: #333333;
    }
    .benchmarkGrid {
      stroke: rgba(127, 127, 127, 0.25);
    }
  </style>
  <g transform="translate(61, 0)" font-family="Roboto Mono, monospace" font-size="12">
    <g class="benchmarkGrid" aria-hidden="true">
      <line x1="0" y1="0" x2="0" y2="100"/>
      <line x1="140" y1="0" x2="140" y2="100"/>
      <line x1="280" y1="0" x2="280" y2="100"/>
    </g>

    <g class="benchmarkLabel" aria-hidden="true" text-anchor="middle">
      <text x="0" y="115">0s</text>
      <text x="140" y="115">10s</text>
      <text x="280" y="115">20s</text>
    </g>

    <g class="benchmarkLabel" text-anchor="end">
      <text x="-10" y="16" font-weight="bold">ty</text>
      <text x="-10" y="41">Pyrefly</text>
      <text x="-10" y="66">Pyright</text>
      <text x="-10" y="91">mypy</text>
    </g>

    <g class="benchmarkBar">
      <rect x="0" y="6" width="27.734" height="13" aria-label="ty: 1.981 seconds"/>
      <rect x="0" y="31" width="35.91" height="13" aria-label="Pyrefly: 2.565 seconds"/>
      <rect x="0" y="56" width="331.842" height="13" aria-label="Pyright: 23.703 seconds"/>
      <rect x="0" y="81" width="340.774" height="13" aria-label="mypy: 24.341 seconds"/>
    </g>

    <g class="benchmarkLabel">
      <text x="33.734" y="16.5" font-weight="bold">1.98s</text>
      <text x="41.91" y="41.5">2.56s</text>
      <text x="337.842" y="66.5">23.70s</text>
      <text x="346.774" y="91.5">24.34s</text>
    </g>
  </g>
</svg>
